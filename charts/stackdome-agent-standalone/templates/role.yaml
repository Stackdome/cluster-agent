apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stackdome-agent-standalone.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackdome-agent-standalone.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

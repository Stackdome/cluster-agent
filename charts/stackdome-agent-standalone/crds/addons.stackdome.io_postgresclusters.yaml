---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: postgresclusters.addons.stackdome.io
spec:
  group: addons.stackdome.io
  names:
    kind: PostgresCluster
    listKind: PostgresClusterList
    plural: postgresclusters
    singular: postgrescluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PostgresCluster is the Schema for the postgresclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PostgresClusterSpec defines the desired state of PostgresCluster.
            properties:
              bootstrapSpec:
                description: Bootstrap is used to specify the bootstrap configuration
                  for the Postgres cluster.
                properties:
                  initDbSpec:
                    properties:
                      import:
                        description: Import is used to import data into the Postgres
                          cluster.
                        properties:
                          databases:
                            description: List of databases to import from the source.
                            items:
                              type: string
                            maxItems: 1
                            minItems: 1
                            type: array
                          sourceClusterSpec:
                            description: SourceClusterSpec is used to specify the
                              source cluster from which the data should be imported.
                            properties:
                              dbName:
                                description: DbName is the name of the database to
                                  connect to in the external Postgres cluster.
                                type: string
                              host:
                                description: Host is the hostname of the external
                                  Postgres cluster.
                                type: string
                              name:
                                description: Name is the name of the external Postgres
                                  cluster.
                                type: string
                              password:
                                properties:
                                  key:
                                    type: string
                                  secretRef:
                                    description: |-
                                      SecretReference represents a Secret Reference. It has enough information to retrieve secret
                                      in any namespace
                                    properties:
                                      name:
                                        description: name is unique within a namespace
                                          to reference a secret resource.
                                        type: string
                                      namespace:
                                        description: namespace defines the space within
                                          which the secret name must be unique.
                                        type: string
                                    type: object
                                    x-kubernetes-map-type: atomic
                                required:
                                - key
                                - secretRef
                                type: object
                              port:
                                default: 5432
                                description: Port is the port of the external Postgres
                                  cluster.
                                maximum: 65535
                                minimum: 1
                                type: integer
                              sslMode:
                                description: SslMode is the SSL mode to use when connecting
                                  to the external Postgres cluster.
                                enum:
                                - disable
                                - require
                                - verify-ca
                                - verify-full
                                type: string
                              user:
                                description: User is the username to connect to the
                                  external Postgres cluster.
                                type: string
                            required:
                            - dbName
                            - host
                            - name
                            - password
                            - port
                            - user
                            type: object
                        required:
                        - databases
                        - sourceClusterSpec
                        type: object
                    type: object
                  recoverySpec:
                    description: |-
                      one of ObjectStoreSpec or BackupSpec must be specified
                      RecoverySpec defines the recovery specification for the Postgres cluster.
                    properties:
                      backupSpec:
                        properties:
                          backupName:
                            description: Name of the cnpg backup to restore from.
                            type: string
                        required:
                        - backupName
                        type: object
                      objectStoreSpec:
                        properties:
                          objectStoreName:
                            description: Name of the barman object store where the
                              backups are stored.
                            type: string
                          recoveryTarget:
                            description: RecoveryTarget is used to specify the point
                              in time to which the Postgres cluster should be recovered.
                            properties:
                              recoveryTargetTime:
                                description: |-
                                  RecoveryTargetName is the name of the recovery target.
                                  This is used to specify the point in time to which the Postgres cluster should be
                                  recovered.
                                type: string
                            required:
                            - recoveryTargetTime
                            type: object
                          sourceClusterName:
                            description: SourceClusterName is the name of the source
                              Postgres cluster from which the data was stored in the
                              object store.
                            type: string
                        required:
                        - objectStoreName
                        - sourceClusterName
                        type: object
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of objectStoreSpec or backupSpec must be
                        specified
                      rule: (has(self.objectStoreSpec) && !has(self.backupSpec)) ||
                        (!has(self.objectStoreSpec) && has(self.backupSpec))
                type: object
              clusterBackupSpec:
                description: ClusterBackupSpec is used to specify the cluster backup
                  configuration for the Postgres cluster.
                properties:
                  lastBaseBackupRequestedAt:
                    description: |-
                      LastBackupRequestedAt is the timestamp when the last backup was requested.
                      This is used to determine if a backup should be taken immediately.
                    format: date-time
                    type: string
                  objectStoreName:
                    description: |-
                      ObjectStoreName is the name of the object store where the backup files should be stored.
                      Assumes the cnpg object store is already created in the cluster.
                    type: string
                  scheduledBaseBackupSpec:
                    description: ScheduledBaseBackupSpec defines the scheduled base
                      backup configuration for the Postgres cluster.
                    properties:
                      enabled:
                        default: true
                        description: Defaults to true, if set to false, the base backup
                          will not be taken.
                        type: boolean
                      schedule:
                        default: 0 0 0 * * 0
                        description: Defaults to "0 0 0 * * 0" (every Sunday at midnight).
                        type: string
                    required:
                    - enabled
                    - schedule
                    type: object
                  walArchivingEnabled:
                    description: |-
                      WalArchivingEnabled indicates whether WAL archiving should be enabled for the Postgres cluster.
                      Used for point-in-time recovery.
                    type: boolean
                required:
                - objectStoreName
                - walArchivingEnabled
                type: object
                x-kubernetes-validations:
                - message: scheduledBaseBackupSpec.enabled must be true when walArchivingEnabled
                    is true
                  rule: '!self.walArchivingEnabled || self.scheduledBaseBackupSpec
                    != null && self.scheduledBaseBackupSpec.enabled == true'
              databases:
                description: Databases is a list of databases to be created in the
                  Postgres cluster.
                items:
                  properties:
                    extensions:
                      description: Extensions is a list of extensions to be created
                        in the database.
                      items:
                        properties:
                          name:
                            description: Name is the name of the extension to be created.
                            enum:
                            - vector
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    name:
                      description: Name is the name of the database to be created.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              enableSuperuserAccess:
                description: EnableSuperuserAccess indicates whether superuser access
                  should be enabled for the Postgres cluster.
                type: boolean
              fencingSpec:
                description: FencingSpec is used to specify the fencing configuration
                  for the Postgres cluster.
                properties:
                  fenceCluster:
                    description: FencingEnabled indicates whether fencing is enabled
                      for the Postgres cluster.
                    type: boolean
                type: object
              hibernationEnabled:
                type: boolean
              instancePlacementSpec:
                description: InstancePlacementSpec defines the placement of the Postgres
                  instances.
                properties:
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: |-
                      NodeSelector is used to specify the node selector for the Postgres instances.
                      This is used to ensure that the Postgres instances are scheduled on specific nodes.
                    type: object
                    x-kubernetes-validations:
                    - message: nodeSelector is immutable
                      rule: self == oldSelf
                  placementPolicy:
                    default: preferred
                    description: PlacementPolicy defines the placement policy for
                      the Postgres instances.
                    enum:
                    - preferred
                    - required
                    type: string
                    x-kubernetes-validations:
                    - message: placementPolicy is immutable
                      rule: self == oldSelf
                  tolerations:
                    description: |-
                      Tolerations are the tolerations to be applied to the Postgres instances.
                      This is used to ensure that the Postgres instances can be scheduled on nodes with specific taints.
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists and Equal. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                    x-kubernetes-validations:
                    - message: tolerations is immutable
                      rule: self == oldSelf
                  topologyKey:
                    default: kubernetes.io/hostname
                    description: |-
                      TopologyKey is the key used to define the topology for the Postgres instances.
                      This is used to ensure that the Postgres instances are spread across different zones or regions.
                    type: string
                    x-kubernetes-validations:
                    - message: topologyKey is immutable
                      rule: self == oldSelf
                required:
                - placementPolicy
                - topologyKey
                type: object
              instances:
                description: Size is the number of Postgres instances in the cluster.
                maximum: 5
                minimum: 1
                type: integer
              postgreSQLSpec:
                description: PostgreSQL version and image configuration
                properties:
                  enableMajorVersionUpgrades:
                    default: false
                    description: EnableMajorVersionUpgrades indicates whether automatic
                      major version upgrades are allowed
                    type: boolean
                  enableMinorVersionUpgrades:
                    default: true
                    description: EnableMinorVersionUpgrades indicates whether automatic
                      minor version upgrades are allowed
                    type: boolean
                  imageCatalogRef:
                    description: ImageCatalogRef references the ImageCatalog to use
                      for this cluster
                    properties:
                      name:
                        description: Name of the ImageCatalog resource
                        type: string
                    required:
                    - name
                    type: object
                  postgreSQLMinorVersion:
                    type: integer
                  postgreSQLVersion:
                    description: PostgreSQLVersion specifies the major version of
                      PostgreSQL to run
                    maximum: 17
                    minimum: 13
                    type: integer
                  postgresConf:
                    additionalProperties:
                      type: string
                    description: |-
                      PostgresConf contains the PostgreSQL configuration parameters to be applied to the cluster.
                      This is a map of parameter names to their values.
                    type: object
                required:
                - imageCatalogRef
                - postgreSQLMinorVersion
                - postgreSQLVersion
                type: object
              replicasSpec:
                description: ReplicasSpec defines the number of synchronous replicas
                  and their configuration.
                properties:
                  dataDurability:
                    default: preferred
                    description: DataDurability defines the data durability level
                      for the Postgres cluster
                    enum:
                    - preferred
                    - required
                    type: string
                  numSynchronousReplicas:
                    default: 0
                    description: |-
                      Number of synchronous replicas.
                      This defines how many replicas should be kept in sync with the primary instance.
                    maximum: 4
                    minimum: 0
                    type: integer
                required:
                - dataDurability
                - numSynchronousReplicas
                type: object
              resourceSpec:
                description: ResourceSpec defines the resource requirements for the
                  Postgres cluster.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              storageSpec:
                description: StorageSpec defines the storage configuration for the
                  Postgres cluster.
                properties:
                  size:
                    description: |-
                      Size is the size of the storage to use for the Postgres cluster
                      kubebuilder:validation:Pattern=`^[0-9]+[KMGTP]i?$`
                    type: string
                  storageClassName:
                    description: StorageClassName is the name of the storage class
                      to use for the Postgres cluster
                    type: string
                    x-kubernetes-validations:
                    - message: StorageClassName is immutable
                      rule: self == oldSelf
                required:
                - size
                - storageClassName
                type: object
            required:
            - instances
            - postgreSQLSpec
            - storageSpec
            type: object
          status:
            description: PostgresClusterStatus defines the observed state of PostgresCluster.
            properties:
              conditions:
                description: Conditions is a list of status conditions ths object
                  is in.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentImage:
                description: CurrentImage is the image currently used by the Postgres
                  cluster.
                type: string
              currentPostgreSQLMajorVersion:
                type: string
              currentPostgreSQLMinorVersion:
                type: string
              lastImmeadiateBackupProcessedAt:
                format: date-time
                type: string
              observedGeneration:
                description: The most recent generation observed by the controller.
                format: int64
                type: integer
              outputs:
                properties:
                  clientCASecretName:
                    description: |-
                      ClientCASecret is the name of the secret containing the CA certificate used for clients to
                      connect to the Postgres cluster.
                    type: string
                  clusterConnection:
                    properties:
                      host:
                        type: string
                      port:
                        format: int32
                        type: integer
                      sslMode:
                        type: string
                    required:
                    - host
                    - port
                    type: object
                  clusterName:
                    type: string
                  databases:
                    items:
                      properties:
                        name:
                          description: Name is the name of the database.
                          type: string
                        owner:
                          description: Owner is the owner of the database.
                          type: string
                      type: object
                    type: array
                  readService:
                    description: ReadService is the service used to access the read
                      replicas.
                    type: string
                  superUserCredentialSecretName:
                    description: SuperUserCredentials contains the credentials for
                      the superuser of the Postgres cluster.
                    type: string
                  userCredentialSecretNames:
                    additionalProperties:
                      type: string
                    description: |-
                      UserCredentials contains the credentials for the users of the Postgres cluster.
                      Map owner role name to the secret name containing the credentials.
                    type: object
                  writeService:
                    description: WriteService is the service used to access the primary
                      instance.
                    type: string
                type: object
              phase:
                default: Pending
                type: string
              statusHash:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

# This rule is not used by the project cluster-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the registry.stackdome.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-agent
    app.kubernetes.io/managed-by: kustomize
  name: registry-registry-editor-role
rules:
- apiGroups:
  - registry.stackdome.io
  resources:
  - registries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - registry.stackdome.io
  resources:
  - registries/status
  verbs:
  - get

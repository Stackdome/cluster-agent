---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - storage.stackdome.io
  resources:
  - nfsservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - storage.stackdome.io
  resources:
  - nfsservers/finalizers
  verbs:
  - update
- apiGroups:
  - storage.stackdome.io
  resources:
  - nfsservers/status
  verbs:
  - get
  - patch
  - update

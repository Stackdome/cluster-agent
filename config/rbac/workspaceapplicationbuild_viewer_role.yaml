# permissions for end users to view workspaceapplicationbuilds.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: workspaceapplicationbuild-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: cluster-agent
    app.kubernetes.io/part-of: cluster-agent
    app.kubernetes.io/managed-by: kustomize
  name: workspaceapplicationbuild-viewer-role
rules:
- apiGroups:
  - workspace.soradev.io
  resources:
  - workspaceapplicationbuilds
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - workspace.soradev.io
  resources:
  - workspaceapplicationbuilds/status
  verbs:
  - get

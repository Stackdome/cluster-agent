# permissions for end users to view workspacevolumes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: workspacevolume-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: cluster-agent
    app.kubernetes.io/part-of: cluster-agent
    app.kubernetes.io/managed-by: kustomize
  name: workspacevolume-viewer-role
rules:
- apiGroups:
  - workspace.soradev.io
  resources:
  - workspacevolumes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - workspace.soradev.io
  resources:
  - workspacevolumes/status
  verbs:
  - get

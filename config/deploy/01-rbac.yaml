  - postgresclusters
  - postgresclusters/status
  - postgresclusters/finalizers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - ingressclasses
  verbs:
  - get
  - watch
  - update
  - list
  - patch

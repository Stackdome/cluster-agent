apiVersion: v1
kind: ServiceAccount
metadata:
  name: stackdome-operator
  namespace: stackdome-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stackdome-operator
  namespace: stackdome-control-plane
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stackdome-operator
  namespace: stackdome-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stackdome-operator
subjects:
- kind: ServiceAccount
  name: stackdome-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stackdome-operator
rules:
- apiGroups:
  - core.stackdome.io
  resources:
  - stacks
  - stacks/status
  - stackresources
  - stackresources/status
  - clusterinfoes
  - clusterinfoes/status
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
  - create
- apiGroups:
  - builds.stackdome.io
  resources:
  - imagebuilds
  - imagebuilds/status
  # TODO Add finalizers
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
  - create
- apiGroups:
  - registry.stackdome.io
  resources:
  - clusterregistries
  - clusterregistries/status
  # TODO Add finalizers
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
  - create
- apiGroups:
  - storage.stackdome.io
  resources:
  - nfsservers
  - nfsservers/status
  - objectstorages
  - objectstorages/status
  - storages
  - storages/status
  - volumes

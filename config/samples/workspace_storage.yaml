apiVersion: storage.stackdome.io/v1alpha1
kind: Storage
metadata:
  name: infisical-storage
  labels:
    app: stackdome
    component: storage
    workspace: infisical
spec:
  provisionedFor: infisical
  userPublicSSHKey: "ssh-rsa "
  volumeSpecs:
    # Persistent database storage
    postgresdata:
      size: "2Gi"
      storageClass: ""
      accessMode: "ReadWriteOnce"
      needsSyncBeforeUse: false
    
    # Persistent Redis storage
    redisdata:
      size: "2Gi"
      storageClass: ""
      accessMode: "ReadWriteOnce"
      needsSyncBeforeUse: false
    
    # Application code with continuous sync
    code:
      size: "2Gi"
      storageClass: "stackdome-rwmany"
      accessMode: "ReadWriteMany"
      needsSyncBeforeUse: true
      source:
        localDir:
          path: "."
          continousSync: true
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stackdome-api-server-sa
  namespace: stackdome-control-plane

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stackdome-api-server-sa-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: stackdome-api-server-sa
    namespace: stackdome-control-plane
---
# sa-token-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: stackdome-api-server-sa-token
  namespace: stackdome-control-plane
  annotations:
    kubernetes.io/service-account.name: stackdome-api-server-sa
type: kubernetes.io/service-account-token



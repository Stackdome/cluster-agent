apiVersion: core.stackdome.io/v1alpha1
kind: Stack
metadata:
  name: infisical-app
spec:
  domain: stackdome.io
  stackResources:
    - name: nginx
      spec:
        imageSpec:
          image: "nginx:latest"
        dependsOn:
          - backend
          - frontend
        volumeMounts:
          - sourceVolume: code
            sourceSubPath: "nginx/default.dev.conf"
            destination: "/etc/nginx/conf.d/default.conf"
        ports:
          - number: 80
            exposeToPublic: true
            isHttp: true
            fqdn: "nginx.stackdome.io"
    
    - name: db
      spec:
        imageSpec:
          image: "postgres:14-alpine"
        volumeMounts:
          - sourceVolume: "postgresdata"
            sourceSubPath: ""
            destination: "/var/lib/postgresql/data"
        environmentVariables:
          - name: POSTGRES_PASSWORD
            value: infisical
          - name: POSTGRES_USER
            value: infisical
          - name: POSTGRES_DB
            value: infisical
        ports:
          - number: 5432
            exposeToPublic: false
            isHttp: false
            fqdn: "db.stackdome.io"
        stateFul: true
    - name: redis
      spec:
        imageSpec:
          image: "redis"
        environmentVariables:
          - name: ALLOW_EMPTY_PASSWORD
            value: "yes"
        volumeMounts:
          - sourceVolume: redisdata
            sourceSubPath: ""
            destination: "/data"
        ports:
          - number: 6379
            exposeToPublic: false
            isHttp: false
            fqdn: "redis.stackdome.io"
        stateFul: true
    - name: rediscommander
      spec:
        imageSpec:
          image: "rediscommander/redis-commander"
        dependsOn:
          - redis
        environmentVariables:
          - name: REDIS_HOSTS
            value: local:redis:6379
        ports:
          - number: 8081
            exposeToPublic: false
            isHttp: false
            fqdn: "rediscommander.stackdome.io"
  
    - name: backend
      spec:
        buildSpec:
          sourceVolumeName: "code"
          buildContext: "/backend"
          dockerFilePath: "/backend/Dockerfile.dev"
          buildSourceHash: "aeff1eeb0c3f2a4d1e5c7f8a9b6rrd2c"
          registry:
            repositoryUrl: "cluster-registry.stackdome-registry.svc.cluster.local/infisical-backend"
            auth:
              type: "InClusterZotRegistry"
              dockerConfigAuth:
                credentialsRef:
                  secretName: registry-creds
                  secretNamespace: stackdome-registry
                  usernameKey: username
                  passwordKey: password
        command: ["/bin/sh", "-c"]
        args:
          - "npm run migration:latest && npm run dev:docker"
        dependsOn:
          - db
          - redis
        ports:
          - number: 4000
            exposeToPublic: true
            isHttp: true
            fqdn: "backend.stackdome.io"
        environmentVariables:
          - name: NODE_ENV
            value: development
          - name: DB_CONNECTION_URI
            value: postgres://infisical:infisical@db/infisical?sslmode=disable
          - name: TELEMETRY_ENABLED
            value: "false"
          - name: TELEMETRY
            value: "false"
        volumeMounts:
          - sourceVolume: "code"
            sourceSubPath: "backend/src"
            destination: "/app/src"
    
    - name: frontend
      spec:
        buildSpec:
          sourceVolumeName: "code"
          buildContext: "/frontend"
          dockerFilePath: "/frontend/Dockerfile.dev"
          buildSourceHash: "aeff1eeb0c3f2a4d1e5c7f8a9b6rrd2c"
          registry:
            repositoryUrl: "cluster-registry.stackdome-registry.svc.cluster.local/infisical-frontend"
            auth:
              type: "InClusterZotRegistry"
              dockerConfigAuth:
                credentialsRef:
                  secretName: registry-creds
                  secretNamespace: stackdome-registry
                  usernameKey: username
                  passwordKey: password
        dependsOn:
          - backend
          - redis
          - db
        ports:
          - number: 3000
            exposeToPublic: true
            isHttp: true
            fqdn: "frontend.stackdome.io"
        volumeMounts:
          - sourceVolume: "code"
            sourceSubPath: "frontend/src"
            destination: "/app/src"
          - sourceVolume: "code"
            sourceSubPath: "frontend/public"
            destination: "/app/public"
        environmentVariables:
          - name: NEXT_PUBLIC_ENV
            value: development
          - name: INFISICAL_TELEMETRY_ENABLED
            value: "false"

apiVersion: users.stackdome.io/v1alpha1
kind: User
metadata:
  name: admin-user
  labels:
    role: admin
    team: platform
spec:
  username: admin
  baseDomain: "stackdome.io"
  namespaces:
    - "ashish-test"
  accessRules:
    # Access to view logs
    - apiGroups: [""]
      resources: ["pods", "pods/log"]
      verbs: ["get", "list", "watch"]
    # Access to exec into pods
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs: ["create"]
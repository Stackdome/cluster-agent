apiVersion: registry.stackdome.io/v1alpha1
kind: ClusterRegistry
metadata:
  name: cluster-registry
spec:
  owner:
    type: Organization
    id: engineering-dept
  storage:
    size: 10Gi
  auth:
    htPasswordCredentials:
      username: ashish
      passwordSecretRef:
        name: password
        namespace: stackdome-registry
  retentionPolicy:
    maxRepositoryCount: 100
    tagsPerRepo: 10
    deleteUntagged: true
  port: 5000

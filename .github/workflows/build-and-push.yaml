name: Build and Push Images

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_ORG: ${{ vars.IMAGE_ORG || 'quay.io/stackdome/cluster-agent' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build images
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          IMAGE_ORG: ${{ env.IMAGE_ORG }}
          CONTAINER_RUNTIME: docker
        run: go run ./cmd/mage build:buildImages

      - name: Push images
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          IMAGE_ORG: ${{ env.IMAGE_ORG }}
          CONTAINER_RUNTIME: docker
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: go run ./cmd/mage build:pushImages

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to Quay.io OCI registry
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: echo "$QUAY_TOKEN" | helm registry login quay.io -u "$QUAY_USER" --password-stdin

      - name: Set chart version
        id: chart_version
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          CHART_VERSION="${VERSION#v}"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync deploy manifests to Helm chart
        run: |
          # Sync CRDs - deploy/crds is the source of truth
          cp config/deploy/crds/*.yaml charts/stackdome-agent-standalone/crds/

          # Sync ClusterRole rules from deploy/01-rbac.yaml into the Helm template.
          # The template header (metadata with Helm expressions) is preserved; only
          # the rules block is replaced.
          TEMPLATE=charts/stackdome-agent-standalone/templates/clusterrole.yaml
          RULES_LINE=$(grep -n "^rules:" "$TEMPLATE" | cut -d: -f1)
          HEADER=$(head -n "$RULES_LINE" "$TEMPLATE")
          RULES=$(yq 'select(.kind == "ClusterRole") | .rules' config/deploy/01-rbac.yaml)
          printf '%s\n%s\n' "$HEADER" "$RULES" > "$TEMPLATE"

      - name: Update chart versions
        env:
          CHART_VERSION: ${{ steps.chart_version.outputs.chart_version }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: $CHART_VERSION/" charts/stackdome-agent-standalone/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/stackdome-agent-standalone/Chart.yaml
          sed -i "s/^version:.*/version: $CHART_VERSION/" charts/stackdome-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/stackdome-agent/Chart.yaml

      - name: Package and push standalone chart
        env:
          CHART_VERSION: ${{ steps.chart_version.outputs.chart_version }}
        run: |
          helm package charts/stackdome-agent-standalone --version "$CHART_VERSION"
          helm push stackdome-agent-standalone-${CHART_VERSION}.tgz oci://quay.io/stackdome/charts

      - name: Update umbrella dependency to OCI
        env:
          CHART_VERSION: ${{ steps.chart_version.outputs.chart_version }}
        run: |
          sed -i "s|repository: \"file://../stackdome-agent-standalone\"|repository: \"oci://quay.io/stackdome/charts\"|" charts/stackdome-agent/Chart.yaml
          sed -i "s/version: \"0.0.0-placeholder\"/version: \"$CHART_VERSION\"/" charts/stackdome-agent/Chart.yaml

      - name: Package and push umbrella chart
        env:
          CHART_VERSION: ${{ steps.chart_version.outputs.chart_version }}
        run: |
          helm dependency build charts/stackdome-agent
          helm package charts/stackdome-agent --version "$CHART_VERSION"
          helm push stackdome-agent-${CHART_VERSION}.tgz oci://quay.io/stackdome/charts

      - name: Bundle CRDs
        run: |
          for f in charts/stackdome-agent-standalone/crds/*.yaml; do
            echo "---" >> crds.yaml
            cat "$f" >> crds.yaml
          done

      - name: Create GitHub Release with CRDs
        uses: softprops/action-gh-release@v2
        with:
          files: crds.yaml
          generate_release_notes: true
